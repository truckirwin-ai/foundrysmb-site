<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- Deep, warm dark background -->
    <radialGradient id="bg" cx="55%" cy="55%" r="75%">
      <stop offset="0%"  stop-color="#1a0d08"/>
      <stop offset="60%" stop-color="#0a0504"/>
      <stop offset="100%" stop-color="#020100"/>
    </radialGradient>

    <!-- Molten stream (top of pour to splash) -->
    <linearGradient id="pour" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff2c4" stop-opacity="0.95"/>
      <stop offset="20%"  stop-color="#ffd35a"/>
      <stop offset="55%"  stop-color="#ff8e2f"/>
      <stop offset="90%"  stop-color="#ff5a1f"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>

    <!-- Bright hot core -->
    <linearGradient id="core" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff2c4"/>
      <stop offset="60%"  stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ffd35a"/>
    </linearGradient>

    <!-- Splash radial -->
    <radialGradient id="splash" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff2c4"/>
      <stop offset="35%"  stop-color="#ffd35a"/>
      <stop offset="70%"  stop-color="#ff8e2f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0"/>
    </radialGradient>

    <!-- Flame radial -->
    <radialGradient id="flame" cx="50%" cy="100%" r="100%">
      <stop offset="0%"   stop-color="#fff2c4"/>
      <stop offset="35%"  stop-color="#ffd35a"/>
      <stop offset="80%"  stop-color="#ff5a1f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff5a1f" stop-opacity="0"/>
    </radialGradient>

    <!-- Heavy glow blur -->
    <filter id="glow-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow-md" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- ============== Background ============== -->
  <rect width="800" height="1000" fill="url(#bg)"/>

  <!-- ============== Ambient heat glow ============== -->
  <ellipse cx="380" cy="600" rx="500" ry="450" fill="#ff5a1f" opacity="0.18" filter="url(#glow-lg)"/>
  <ellipse cx="380" cy="500" rx="240" ry="380" fill="#ffd35a" opacity="0.14" filter="url(#glow-lg)"/>

  <!-- ============== Crucible / vessel (tilted, top-left) ============== -->
  <!-- Outer iron body -->
  <path d="M 30 180 L 440 120 L 430 320 L 380 360 L 70 340 Z"
        fill="#1a0a06" stroke="#3d1810" stroke-width="3" stroke-linejoin="miter"/>
  <!-- Heat-glowing rim (where the metal pours out) -->
  <path d="M 30 180 L 440 120"
        stroke="#ff8e2f" stroke-width="6" opacity="0.65" filter="url(#glow-sm)"/>
  <!-- Top-down view of the molten metal inside -->
  <ellipse cx="235" cy="180" rx="205" ry="28" fill="#0d0503"/>
  <ellipse cx="240" cy="180" rx="170" ry="20" fill="#ff8e2f" opacity="0.85"/>
  <ellipse cx="240" cy="180" rx="120" ry="14" fill="#ffd35a"/>
  <ellipse cx="245" cy="178" rx="60"  ry="6"  fill="#fff2c4"/>
  <!-- Outer scale/texture lines on the iron -->
  <path d="M 60 230 L 100 240 M 130 250 L 165 245 M 200 260 L 235 255 M 280 268 L 320 260" stroke="#3d1810" stroke-width="1.5" opacity="0.7"/>
  <path d="M 80 280 L 150 285 M 180 295 L 250 290 M 290 300 L 360 295" stroke="#3d1810" stroke-width="1.5" opacity="0.6"/>
  <!-- Vessel handle hint (right side) -->
  <path d="M 440 130 Q 470 160 460 220" stroke="#3d1810" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- ============== Pour stream — multi-layer for depth ============== -->
  <!-- Outer diffuse heat halo -->
  <path d="M 410 200 Q 510 480 470 920"
        stroke="url(#pour)" stroke-width="220" fill="none" opacity="0.28"
        filter="url(#glow-lg)" stroke-linecap="round"/>
  <!-- Mid stream — wide molten body -->
  <path d="M 410 200 Q 510 480 470 920"
        stroke="url(#pour)" stroke-width="110" fill="none" opacity="0.65"
        filter="url(#glow-md)" stroke-linecap="round"/>
  <!-- Sharper stream -->
  <path d="M 412 210 Q 508 482 472 910"
        stroke="url(#pour)" stroke-width="58" fill="none" opacity="0.95"
        stroke-linecap="round"/>
  <!-- Hot inner core -->
  <path d="M 414 220 Q 506 484 474 900"
        stroke="url(#core)" stroke-width="22" fill="none"
        stroke-linecap="round"/>
  <!-- Brightest center -->
  <path d="M 416 230 Q 504 486 476 890"
        stroke="#fff8d0" stroke-width="6" fill="none" opacity="0.9"
        stroke-linecap="round"/>

  <!-- ============== Drips along the stream ============== -->
  <circle cx="350" cy="290" r="6" fill="#ffd35a" filter="url(#glow-sm)"/>
  <circle cx="375" cy="380" r="4" fill="#ff8e2f"/>
  <circle cx="430" cy="500" r="5" fill="#ffd35a"/>
  <circle cx="465" cy="640" r="7" fill="#ffe066" filter="url(#glow-sm)"/>
  <circle cx="450" cy="780" r="4" fill="#ff8e2f"/>
  <circle cx="490" cy="850" r="3" fill="#ffd35a"/>

  <!-- ============== Splash + landing pool ============== -->
  <ellipse cx="475" cy="930" rx="280" ry="60" fill="url(#splash)" opacity="0.85" filter="url(#glow-md)"/>
  <ellipse cx="475" cy="930" rx="160" ry="30" fill="#fff2c4" opacity="0.7"/>
  <!-- Mold / receiving cup -->
  <rect x="380" y="940" width="200" height="70" fill="#1a0a06" stroke="#5a2818" stroke-width="2"/>
  <ellipse cx="480" cy="942" rx="98" ry="10" fill="#fff2c4" opacity="0.5"/>

  <!-- ============== Flames at base ============== -->
  <ellipse cx="200" cy="900" rx="150" ry="120" fill="url(#flame)" opacity="0.85" filter="url(#glow-md)"/>
  <ellipse cx="100" cy="850" rx="90" ry="180" fill="url(#flame)" opacity="0.7" filter="url(#glow-md)"/>
  <ellipse cx="640" cy="900" rx="140" ry="100" fill="url(#flame)" opacity="0.75" filter="url(#glow-md)"/>
  <ellipse cx="700" cy="800" rx="80" ry="160" fill="url(#flame)" opacity="0.55" filter="url(#glow-md)"/>

  <!-- Flame tongues — sharper -->
  <path d="M 150 980 Q 130 880 170 820 Q 190 880 175 980 Z" fill="#ffd35a" opacity="0.6"/>
  <path d="M 220 980 Q 210 870 240 800 Q 260 880 245 980 Z" fill="#ff8e2f" opacity="0.5"/>
  <path d="M 90 980 Q 80 850 110 780 Q 130 870 115 980 Z" fill="#ffd35a" opacity="0.4"/>
  <path d="M 600 980 Q 580 870 620 810 Q 650 880 630 980 Z" fill="#ffd35a" opacity="0.55"/>
  <path d="M 670 980 Q 650 850 690 790 Q 720 870 705 980 Z" fill="#ff8e2f" opacity="0.45"/>

  <!-- ============== Drifting sparks ============== -->
  <circle cx="280" cy="650" r="2.5" fill="#fff2c4"/>
  <circle cx="630" cy="600" r="2" fill="#ffd35a"/>
  <circle cx="180" cy="500" r="1.5" fill="#fff2c4"/>
  <circle cx="720" cy="450" r="2" fill="#ffd35a"/>
  <circle cx="560" cy="380" r="1.5" fill="#fff2c4"/>
  <circle cx="320" cy="720" r="2.5" fill="#ffd35a"/>
  <circle cx="660" cy="700" r="1.5" fill="#fff2c4"/>
  <circle cx="220" cy="780" r="2" fill="#ffd35a"/>
  <circle cx="540" cy="560" r="1" fill="#fff2c4"/>
  <circle cx="380" cy="420" r="1.5" fill="#ffd35a"/>
  <circle cx="610" cy="280" r="1" fill="#fff2c4"/>

  <!-- ============== Subtle vignette ============== -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
    <stop offset="60%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="800" height="1000" fill="url(#vignette)"/>
</svg>
